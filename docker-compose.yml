services:
  # ── NestJS API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: apps/api/.env
    environment:
      PORT: "3002"
      FRONTEND_ORIGIN: "https://${DOMAIN}"
    volumes:
      - api-data:/app/.local
    expose:
      - "3002"

  # ── Next.js Web ──────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "https://${DOMAIN}/api"
    restart: unless-stopped
    environment:
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    expose:
      - "3001"
    depends_on:
      - api

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - web

  # ── Certbot (SSL renewal only — initial cert via scripts/init-ssl.sh) ────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Called manually for renewal: docker compose run --rm certbot renew
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

volumes:
  api-data:       # persistent operations / auth / settings store
  certbot-www:    # ACME webroot (shared with nginx for renewals)
  certbot-certs:  # Let's Encrypt certificates
